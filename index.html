<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contador de Tickets - Bancarlo</title>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
<style>
  html, body {
    height: 100%;
    margin: 0;
    padding: 0;
    background-color: #000;
    font-family: "Poppins", sans-serif;
    color: #00ff66;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }

  .wrapper {
    min-height: 100%;
    display: flex;
    flex-direction: column;
    box-sizing: border-box;
    padding: 20px;
    width: 100%;
  }

  h1 {
    color: #00ff66;
    text-align: center;
    margin-top: 10px;
    margin-bottom: 20px;
    font-size: 2rem;
  }

  .card {
    background-color: #111;
    padding: 25px;
    border-radius: 12px;
    width: 100%;
    box-shadow: 0 0 15px rgba(0, 255, 102, 0.3);
    box-sizing: border-box;
    margin-bottom: 20px;
    border: 1px solid #222;
  }

  .contador-contenedor {
    display: flex;
    justify-content: space-between;
    gap: 15px;
    margin: 20px 0;
  }

  .pantalla {
    flex: 1;
    background-color: #161616;
    padding: 15px;
    border-radius: 8px;
    border: 2px dashed #00ff66;
    text-align: center;
  }

  .pantalla span {
    display: block;
    font-size: 0.9rem;
    color: #888;
    margin-bottom: 5px;
  }

  .pantalla div {
    font-size: 2.2rem;
    font-weight: bold;
    color: #fff;
  }

  label {
    font-size: 1.1rem;
    color: #00ff66;
    display: block;
    margin-bottom: 8px;
  }

  input, button {
    display: block;
    width: 100%;
    margin: 15px 0;
    box-sizing: border-box;
  }

  input {
    padding: 15px;
    border-radius: 8px;
    border: 1px solid #333;
    outline: none;
    background-color: #222;
    color: #fff;
    font-size: 1.1rem;
  }

  input[type="file"] {
    display: none;
  }

  .custom-file-upload {
    border: 2px solid #00ff66;
    display: block;
    padding: 15px;
    cursor: pointer;
    background: #222;
    color: #fff;
    border-radius: 8px;
    font-weight: bold;
    text-align: center;
    font-size: 1.1rem;
    margin-top: 15px;
  }

  .custom-file-upload:hover {
    background: #292929;
    box-shadow: 0 0 10px #00ff66;
  }

  button {
    background-color: #00ff66;
    color: #000;
    padding: 15px;
    font-weight: bold;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-size: 1.1rem;
    transition: 0.3s;
  }

  button:hover {
    background-color: #00cc55;
  }

  .detalles-ticket {
    background: #1c1c1c;
    padding: 15px;
    border-radius: 8px;
    margin-top: 15px;
    text-align: left;
    display: none;
    font-size: 1.05rem;
    color: #fff;
    border-left: 4px solid #00ff66;
  }

  .historial {
    background: #111;
    border-radius: 8px;
    padding: 20px;
    width: 100%;
    box-sizing: border-box;
    margin-bottom: 20px;
  }

  .historial-item {
    border-bottom: 1px solid #222;
    padding: 12px 0;
    font-size: 1rem;
  }

  .preview-container {
    border-radius: 8px;
    overflow: hidden;
    border: 2px solid #222;
    background-color: #111;
    display: none;
    width: 100%;
    text-align: center;
    padding-bottom: 20px;
  }

  .preview-container img {
    width: 100%;
    max-width: 400px;
    height: auto;
    display: inline-block;
    margin-top: 10px;
  }
</style>
</head>
<body>

  <div class="wrapper">
    <h1>🧾 Contador de Tickets Bancarlo</h1>
    
    <div class="card">
      <label for="correo">📧 Correo electrónico de cuenta Bancarlo:</label>
      <input type="email" id="correo" placeholder="tucorreo@gmail.com" oninput="conectarUsuarioFirebase()">

      <div class="contador-contenedor">
        <div class="pantalla">
          <span>CASHBACK TOTAL</span>
          <div id="pantallaCashback">$0.00</div>
        </div>
        <div class="pantalla">
          <span>PUNTOS BANCARLO</span>
          <div id="pantallaPuntos">0 pts</div>
        </div>
      </div>

      <label for="foto-ticket" class="custom-file-upload" id="labelCarga">
        📸 Escanear ticket o recibo
      </label>
      <input type="file" id="foto-ticket" accept="image/*" onchange="procesarTicketReal(event)">

      <div class="detalles-ticket" id="detallesTicket"></div>

      <button id="btnSumar" onclick="depositarFondosOPuntos()" style="display: none; margin-top: 15px;">➕ Validar y Subir a Firebase</button>
    </div>

    <div class="historial">
      <h3 style="margin-top:0; color:#00ff66; font-size: 1.3rem;">📜 Historial de Beneficios Obtenidos</h3>
      <div id="listaTickets"></div>
    </div>

    <div class="preview-container" id="previewContainer">
      <h4 style="color:#888;">🖼️ Vista previa procesada (Filtro OCR Inteligente)</h4>
      <img id="imgPreview" src="" alt="Ticket">
    </div>
  </div>

<script>
  // Inicialización de Firebase
  const firebaseConfig = {
      apiKey: "AIzaSyDNnq2YzWJLi_YfPNqgRY4oCMKOJQjrOGw",
      databaseURL: "https://bancarlo-23297-default-rtdb.firebaseio.com",
      projectId: "bancarlo-23297",
  };
  
  firebase.initializeApp(firebaseConfig);
  const database = firebase.database();

  let acumuladoCashback = 0.00;
  let acumuladoPuntos = 0;
  let historialTransacciones = [];
  let transaccionActual = null;

  window.onload = () => {
    document.getElementById("correo").value = ""; 
    actualizarMarcadores();
    actualizarHistorialVisual();
  };

  function cleanEmailKey(email) {
    return email.toLowerCase().replace(/\./g, '_');
  }

  function actualizarMarcadores() {
    document.getElementById("pantallaCashback").innerText = `$${acumuladoCashback.toFixed(2)}`;
    document.getElementById("pantallaPuntos").innerText = `${acumuladoPuntos} pts`;
  }

  function conectarUsuarioFirebase() {
    const correo = document.getElementById("correo").value.trim();
    if (!correo || !correo.includes("@")) return;

    const userKey = cleanEmailKey(correo);
    database.ref('users/' + userKey).once('value').then((snapshot) => {
      const data = snapshot.val() || {};
      acumuladoCashback = data.debito !== undefined ? parseFloat(data.debito) : 0.00;
      acumuladoPuntos = data.puntos !== undefined ? parseInt(data.puntos) : 0;
      actualizarMarcadores();
      actualizarHistorialVisual();
    });
  }

  const comerciosOfertas = [
    { nombre: "G500", palabrasClave: ["g500", "g 500", "zumpango", "constituyentes", "p01015", "servicios energeticos"], tipo: "cashback", valor: 0.005, min: 0 },
    { nombre: "Farmacia Guadalajara", palabrasClave: ["guadalajara", "superfarma", "farmacias"], tipo: "cashback", valor: 0.10, min: 0 },
    { nombre: "Asturiano", palabrasClave: ["asturiano"], tipo: "cashback", valor: 0.05, min: 0 },
    { nombre: "The Italian Coffee", palabrasClave: ["italian", "coffee"], tipo: "puntos", valor: 60, min: 0 },
    { nombre: "Que Bara", palabrasClave: ["que bara", "bara"], tipo: "puntos", valor: 25, min: 200 },
    { nombre: "Walmart", palabrasClave: ["walmart", "supercenter", "wm"], tipo: "puntos", valor: 50, min: 3000 },
    { nombre: "Salchichonería San Juan", palabrasClave: ["salchichoneria san juan", "san juan embutidos"], tipo: "cashback", valor: 0.025, min: 150 }
  ];

  function preprocesarImagenParaOCR(imageElement) {
    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = imageElement.width;
    canvas.height = imageElement.height;
    
    ctx.drawImage(imageElement, 0, 0);
    const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
    const data = imgData.data;
    
    for (let i = 0; i < data.length; i += 4) {
      const r = data[i];
      const g = data[i+1];
      const b = data[i+2];
      const gris = 0.2126 * r + 0.7152 * g + 0.0722 * b;
      const v = (gris < 132) ? 0 : 255;
      data[i] = v;     
      data[i+1] = v;   
      data[i+2] = v;   
    }
    
    ctx.putImageData(imgData, 0, 0);
    return canvas.toDataURL();
  }

  async function procesarTicketReal(event) {
    const correo = document.getElementById("correo").value.trim();
    if (!correo) {
      alert("⚠️ Primero debes ingresar tu correo electrónico para vincular tus saldos.");
      event.target.value = "";
      return;
    }

    const input = event.target;
    if (!input.files || !input.files[0]) return;

    const file = input.files[0];
    const labelCarga = document.getElementById("labelCarga");
    const panelDetalles = document.getElementById("detallesTicket");
    
    labelCarga.innerText = "⏳ Aplicando filtros de binarización...";
    panelDetalles.style.display = "block";
    panelDetalles.innerHTML = "<strong>Preparando imagen y mejorando contrastes...</strong>";

    const reader = new FileReader();
    reader.onload = function(e) {
      const imgAux = new Image();
      imgAux.src = e.target.result;
      imgAux.onload = async function() {
        
        const imagenProcesadaURL = preprocesarImagenParaOCR(imgAux);
        
        document.getElementById("imgPreview").src = imagenProcesadaURL;
        document.getElementById("previewContainer").style.display = "block";
        labelCarga.innerText = "⏳ Extrayendo caracteres con Tesseract OCR...";

        try {
          // Solución al error: Usamos directamente Tesseract.recognize sin crear workers manuales que rompan hilos
          const result = await Tesseract.recognize(imagenProcesadaURL, 'spa');

          const textoLimpio = result.data.text.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
          const nombreArchivo = file.name.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
          const textoAnalisis = textoLimpio + " " + nombreArchivo;

          let comercioDetectado = comerciosOfertas.find(c => {
            return c.palabrasClave.some(palabra => textoAnalisis.includes(palabra));
          });

          let nombreEstablecimiento = comercioDetectado ? comercioDetectado.nombre : "Ticket de Consumo General";

          let montoCompra = 0;
          let coincidencias;
          let todosLosMontos = [];

          const regexGeneral = /\b([0-9]{1,5}\.[0-9]{2})\b/g;
          while ((coincidencias = regexGeneral.exec(textoLimpio)) !== null) {
            if (coincidencias[1]) {
              const valorEncontrado = parseFloat(coincidencias[1]);
              if (valorEncontrado !== 2405 && valorEncontrado !== 2026) {
                todosLosMontos.push(valorEncontrado);
              }
            }
          }

          if (todosLosMontos.length > 0) {
            montoCompra = Math.max(...todosLosMontos);
          }

          let confirmNombre = prompt("Confirma o escribe el nombre del Establecimiento del ticket:", nombreEstablecimiento);
          if (confirmNombre) nombreEstablecimiento = confirmNombre;

          let confirmMonto = prompt("Confirma o introduce el Monto Total ($) exacto del ticket:", montoCompra > 0 ? montoCompra : "0.00");
          if (confirmMonto) montoCompra = parseFloat(confirmMonto) || 0;

          let comercioFinal = comerciosOfertas.find(c => 
            nombreEstablecimiento.toLowerCase().includes(c.nombre.toLowerCase())
          );

          if (!comercioFinal) {
            comercioFinal = { nombre: nombreEstablecimiento, tipo: "cashback", valor: 0.01, min: 0 };
          }

          let cashbackGanado = 0;
          let puntosGanados = 0;
          let mensajeRegla = "";

          if (comercioFinal.tipo === "cashback") {
            if (montoCompra >= comercioFinal.min) {
              cashbackGanado = montoCompra * comercioFinal.valor;
              mensajeRegla = `Aplica oferta del ${(comercioFinal.valor * 100).toFixed(1)}% de cashback asignado.`;
            } else {
              mensajeRegla = `No alcanzó el consumo mínimo de $${comercioFinal.min} para esta promoción.`;
            }
          } else if (comercioFinal.tipo === "puntos") {
            if (montoCompra >= comercioFinal.min) {
              puntosGanados = comercioFinal.valor;
              mensajeRegla = `Aplica bonificación fija de +${comercioFinal.valor} puntos Bancarlo.`;
            } else {
              mensajeRegla = `No alcanzó el monto mínimo de $${comercioFinal.min} para asignación de puntos.`;
            }
          }

          transaccionActual = {
            comercio: comercioFinal.nombre,
            monto: montoCompra,
            cashback: cashbackGanado,
            puntos: puntosGanados
          };

          panelDetalles.innerHTML = `
            <strong>🏪 Establecimiento Reconocido:</strong> ${comercioFinal.nombre}<br>
            <strong>📄 Archivo Analizado:</strong> ${file.name}<br>
            <strong>💵 Monto Máximo Detectado por el OCR:</strong> $${montoCompra.toFixed(2)}<br>
            <strong>📢 Estado de Validación:</strong> ${mensajeRegla}<br>
            <hr style="border:1px solid #333;">
            <span style="color:#00ff66; font-weight:bold;">Beneficio Detectado: +$${cashbackGanado.toFixed(2)} Cashback | +${puntosGanados} Puntos</span>
          `;

          document.getElementById("btnSumar").style.display = "block";

        } catch (err) {
          console.error("Error detallado del motor OCR:", err);
          alert("❌ Error en el procesamiento OCR. Revisa la consola del navegador.");
        } finally {
          labelCarga.innerText = "📸 Escanear ticket o recibo";
        }
      };
    };
    reader.readAsDataURL(file);
  }

  function depositarFondosOPuntos() {
    const correo = document.getElementById("correo").value.trim();
    if (!correo || !transaccionActual) return;

    const userKey = cleanEmailKey(correo);

    database.ref('users/' + userKey).once('value').then((snapshot) => {
      const data = snapshot.val() || {};
      let saldoDebito = data.debito !== undefined ? parseFloat(data.debito) : 0.00;
      let saldoPuntos = data.puntos !== undefined ? parseInt(data.puntos) : 0;

      let nuevoDebito = saldoDebito + transaccionActual.cashback;
      let nuevosPuntos = saldoPuntos + transaccionActual.puntos;

      database.ref('users/' + userKey + '/debito').set(parseFloat(nuevoDebito.toFixed(6)));
      database.ref('users/' + userKey + '/puntos').set(nuevosPuntos)
      .then(() => {
        acumuladoCashback = nuevoDebito;
        acumuladoPuntos = nuevosPuntos;

        const fechaStr = new Date().toLocaleTimeString("es-MX", { hour: '2-digit', minute: '2-digit' });
        historialTransacciones.unshift({
          hora: fechaStr,
          comercio: transaccionActual.comercio,
          cashback: transaccionActual.cashback.toFixed(2),
          puntos: transaccionActual.puntos
        });

        actualizarMarcadores();
        actualizarHistorialVisual();
        
        document.getElementById("btnSumar").style.display = "none";
        document.getElementById("previewContainer").style.display = "none";
        document.getElementById("detallesTicket").style.display = "none";
        document.getElementById("foto-ticket").value = "";
        transaccionActual = null;

        alert("✅ ¡Éxito! Datos guardados correctamente.");
      });
    });
  }

  function actualizarHistorialVisual() {
    const contenedor = document.getElementById("listaTickets");
    contenedor.innerHTML = "";

    if (historialTransacciones.length === 0) {
      contenedor.innerHTML = '<div class="historial-item" style="color:#666;border:none;">Ningún beneficio guardado en esta sesión.</div>';
      return;
    }

    historialTransacciones.forEach((item) => {
      contenedor.innerHTML += `
        <div class="historial-item">
          <strong>${item.comercio}</strong> (${item.hora}) — Regresó: <span style="color:#fff;">+$${item.cashback}</span> y <span style="color:#00ff99;">+${item.puntos} pts</span>
        </div>
      `;
    });
  }
</script>

</body>
</html>
