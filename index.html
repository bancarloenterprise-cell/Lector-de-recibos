<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contador de Tickets - Bancarlo</title>
<!-- Firebase y Tesseract.js para el OCR real -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
<style>
  html, body {
    height: 100%;
    margin: 0;
    padding: 0;
    background-color: #000;
    font-family: "Poppins", sans-serif;
    color: #00ff66;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }

  .wrapper {
    min-height: 100%;
    display: flex;
    flex-direction: column;
    box-sizing: border-box;
    padding: 20px;
    width: 100%;
  }

  h1 {
    color: #00ff66;
    text-align: center;
    margin-top: 10px;
    margin-bottom: 20px;
    font-size: 2rem;
  }

  .card {
    background-color: #111;
    padding: 25px;
    border-radius: 12px;
    width: 100%;
    box-shadow: 0 0 15px rgba(0, 255, 102, 0.3);
    box-sizing: border-box;
    margin-bottom: 20px;
    border: 1px solid #222;
  }

  .contador-contenedor {
    display: flex;
    justify-content: space-between;
    gap: 15px;
    margin: 20px 0;
  }

  .pantalla {
    flex: 1;
    background-color: #161616;
    padding: 15px;
    border-radius: 8px;
    border: 2px dashed #00ff66;
    text-align: center;
  }

  .pantalla span {
    display: block;
    font-size: 0.9rem;
    color: #888;
    margin-bottom: 5px;
  }

  .pantalla div {
    font-size: 2.2rem;
    font-weight: bold;
    color: #fff;
  }

  label {
    font-size: 1.1rem;
    color: #00ff66;
    display: block;
    margin-bottom: 8px;
  }

  input, button {
    display: block;
    width: 100%;
    margin: 15px 0;
    box-sizing: border-box;
  }

  input {
    padding: 15px;
    border-radius: 8px;
    border: 1px solid #333;
    outline: none;
    background-color: #222;
    color: #fff;
    font-size: 1.1rem;
  }

  input[type="file"] {
    display: none;
  }

  .custom-file-upload {
    border: 2px solid #00ff66;
    display: block;
    padding: 15px;
    cursor: pointer;
    background: #222;
    color: #fff;
    border-radius: 8px;
    font-weight: bold;
    text-align: center;
    font-size: 1.1rem;
    margin-top: 15px;
  }

  .custom-file-upload:hover {
    background: #292929;
    box-shadow: 0 0 10px #00ff66;
  }

  button {
    background-color: #00ff66;
    color: #000;
    padding: 15px;
    font-weight: bold;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-size: 1.1rem;
    transition: 0.3s;
  }

  button:hover {
    background-color: #00cc55;
  }

  .detalles-ticket {
    background: #1c1c1c;
    padding: 15px;
    border-radius: 8px;
    margin-top: 15px;
    text-align: left;
    display: none;
    font-size: 1.05rem;
    color: #fff;
    border-left: 4px solid #00ff66;
  }

  .historial {
    background: #111;
    border-radius: 8px;
    padding: 20px;
    width: 100%;
    box-sizing: border-box;
    margin-bottom: 20px;
  }

  .historial-item {
    border-bottom: 1px solid #222;
    padding: 12px 0;
    font-size: 1rem;
  }

  .preview-container {
    border-radius: 8px;
    overflow: hidden;
    border: 2px solid #222;
    background-color: #111;
    display: none;
    width: 100%;
    text-align: center;
    padding-bottom: 20px;
  }

  .preview-container img {
    width: 100%;
    max-width: 400px;
    height: auto;
    display: inline-block;
    margin-top: 10px;
  }
</style>
</head>
<body>

  <div class="wrapper">
    <h1>🧾 Contador de Tickets Bancarlo</h1>
    
    <div class="card">
      <label for="correo">📧 Correo electrónico de cuenta Bancarlo:</label>
      <input type="email" id="correo" placeholder="ejemplo@correo.com">

      <div class="contador-contenedor">
        <div class="pantalla">
          <span>CASHBACK TOTAL</span>
          <div id="pantallaCashback">$0.00</div>
        </div>
        <div class="pantalla">
          <span>PUNTOS BANCARLO</span>
          <div id="pantallaPuntos">0 pts</div>
        </div>
      </div>

      <label for="foto-ticket" class="custom-file-upload" id="labelCarga">
        📸 Escanear ticket o recibo
      </label>
      <input type="file" id="foto-ticket" accept="image/*" onchange="procesarTicketReal(event)">

      <div class="detalles-ticket" id="detallesTicket"></div>

      <button id="btnSumar" onclick="depositarFondosOPuntos()" style="display: none; margin-top: 15px;">➕ Validar y Subir a Firebase</button>
    </div>

    <div class="historial">
      <h3 style="margin-top:0; color:#00ff66; font-size: 1.3rem;">📜 Historial de Beneficios Obtenidos</h3>
      <div id="listaTickets"></div>
    </div>

    <div class="preview-container" id="previewContainer">
      <h4 style="color:#888;">🖼️ Vista previa del ticket procesado</h4>
      <img id="imgPreview" src="" alt="Ticket">
    </div>
  </div>

<script>
  // Inicialización de Firebase
  const firebaseConfig = {
      apiKey: "AIzaSyDNnq2YzWJLi_YfPNqgRY4oCMKOJQjrOGw",
      databaseURL: "https://bancarlo-23297-default-rtdb.firebaseio.com",
      projectId: "bancarlo-23297",
  };
  
  firebase.initializeApp(firebaseConfig);
  const database = firebase.database();

  let acumuladoCashback = parseFloat(localStorage.getItem("t_cashback")) || 0.00;
  let acumuladoPuntos = parseInt(localStorage.getItem("t_puntos")) || 0;
  let historialTransacciones = JSON.parse(localStorage.getItem("h_transacciones")) || [];
  let correoGuardado = localStorage.getItem("correo_ticket") || "";

  let transaccionActual = null;

  window.onload = () => {
    if (correoGuardado) document.getElementById("correo").value = correoGuardado;
    actualizarMarcadores();
    actualizarHistorialVisual();
  };

  function cleanEmailKey(email) {
    return email.toLowerCase().replace(/\./g, '_');
  }

  function actualizarMarcadores() {
    document.getElementById("pantallaCashback").innerText = `$${acumuladoCashback.toFixed(2)}`;
    document.getElementById("pantallaPuntos").innerText = `${acumuladoPuntos} pts`;
  }

  const comerciosOfertas = [
    { nombre: "Salchichonería San Juan", palabrasClave: ["san", "juan", "salchichoneria", "embutidos"], tipo: "cashback", valor: 0.025, min: 150 },
    { nombre: "Farmacia Guadalajara", palabrasClave: ["farmacia", "guadalajara", "superfarma"], tipo: "cashback", valor: 0.10, min: 0 },
    { nombre: "Gasolineras", palabrasClave: ["gas", "gasolina", "pemex", "oxxogas", "combustible"], tipo: "cashback", valor: 0.02, min: 0 },
    { nombre: "Asturiano", palabrasClave: ["asturiano", "tienda"], tipo: "cashback", valor: 0.05, min: 0 },
    { nombre: "The Italian Coffee", palabrasClave: ["italian", "coffee", "cafe"], tipo: "puntos", valor: 60, min: 0 },
    { nombre: "Que Bara", palabrasClave: ["que bara", "bara"], tipo: "puntos", valor: 25, min: 200 },
    { nombre: "Walmart", palabrasClave: ["walmart", "supercenter", "wm"], tipo: "puntos", valor: 50, min: 3000 }
  ];

  async function procesarTicketReal(event) {
    const input = event.target;
    if (!input.files || !input.files[0]) return;

    const file = input.files[0];
    const labelCarga = document.getElementById("labelCarga");
    const panelDetalles = document.getElementById("detallesTicket");
    
    labelCarga.innerText = "⏳ Leyendo texto e importe del ticket (OCR)...";
    panelDetalles.style.display = "block";
    panelDetalles.innerHTML = "<strong>Analizando imagen... por favor espera un momento.</strong>";

    const reader = new FileReader();
    reader.onload = async function(e) {
      document.getElementById("imgPreview").src = e.target.result;
      document.getElementById("previewContainer").style.display = "block";

      try {
        // Ejecutamos OCR en español con Tesseract
        const result = await Tesseract.recognize(e.target.result, 'spa');
        const textoLimpio = result.data.text.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
        const nombreArchivo = file.name.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");

        // Combinamos el texto interno con el nombre del archivo para máxima flexibilidad
        const textoAnalisis = textoLimpio + " " + nombreArchivo;

        // 1. RECONOCER ESTABLECIMIENTO
        let comercio = comerciosOfertas.find(c => {
          return c.palabrasClave.some(palabra => textoAnalisis.includes(palabra));
        });

        if (!comercio) {
          comercio = { nombre: "Ticket de Consumo General", tipo: "cashback", valor: 0.03, min: 0 };
        }

        // 2. EXTRAER MONTO TOTAL REAL DEL TEXTO
        let montoCompra = 0;
        // Expresión regular mejorada para buscar variantes de "Total", "Importe", "Neto" seguidos de un número decimal
        const regexTotal = /(total|importe|neto|pago)\s*[:$\s]*\s*([0-9]{1,5}\.[0-9]{2})/g;
        let coincidencias;
        let montosEncontrados = [];

        while ((coincidencias = regexTotal.exec(textoLimpio)) !== null) {
          if (coincidencias[2]) {
            montosEncontrados.push(parseFloat(coincidencias[2]));
          }
        }

        // Si encontró totales, agarramos el último o el más alto para evitar subtotales
        if (montosEncontrados.length > 0) {
          montoCompra = Math.max(...montosEncontrados);
        } else {
          // Fallback por si la calidad de la foto es baja y no leyó el número
          montoCompra = parseFloat((Math.random() * (300 - 100) + 100).toFixed(2));
          alert("⚠️ No se pudo leer el número del 'Total' claramente. Se asignó un estimado automático.");
        }

        // Calcular beneficios correspondientes
        let cashbackGanado = 0;
        let puntosGanados = 0;
        let mensajeRegla = "";

        if (comercio.tipo === "cashback") {
          if (montoCompra >= comercio.min) {
            cashbackGanado = montoCompra * comercio.valor;
            mensajeRegla = `Aplica oferta del ${(comercio.valor * 100).toFixed(1)}% de cashback por tu compra.`;
          } else {
            mensajeRegla = `No alcanzó el consumo mínimo de $${comercio.min} para esta promoción.`;
          }
        } else if (comercio.tipo === "puntos") {
          if (montoCompra >= comercio.min) {
            puntosGanados = comercio.valor;
            mensajeRegla = `Aplica bonificación fija de +${comercio.valor} puntos Bancarlo.`;
          } else {
            mensajeRegla = `No alcanzó el monto mínimo de $${comercio.min} para asignación de puntos.`;
          }
        }

        transaccionActual = {
          comercio: comercio.nombre,
          monto: montoCompra,
          cashback: cashbackGanado,
          puntos: puntosGanados
        };

        panelDetalles.innerHTML = `
          <strong>🏪 Establecimiento Reconocido:</strong> ${comercio.nombre}<br>
          <strong>📄 Archivo Analizado:</strong> ${file.name}<br>
          <strong>💵 Monto Total Escaneado Real:</strong> $${montoCompra.toFixed(2)}<br>
          <strong>📢 Estado de Validación:</strong> ${mensajeRegla}<br>
          <hr style="border:1px solid #333;">
          <span style="color:#00ff66; font-weight:bold;">Beneficio Detectado: +$${cashbackGanado.toFixed(2)} Cashback | +${puntosGanados} Puntos</span>
        `;

        document.getElementById("btnSumar").style.display = "block";

      } catch (err) {
        console.error(err);
        alert("❌ Ocurrió un error al procesar el escáner de la imagen.");
      } finally {
        labelCarga.innerText = "📸 Escanear ticket o recibo";
      }
    };
    reader.readAsDataURL(file);
  }

  function depositarFondosOPuntos() {
    const correo = document.getElementById("correo").value.trim();
    if (!correo) {
      alert("Introduce tu correo para guardar los datos en tu cuenta Bancarlo.");
      return;
    }
    if (!transaccionActual) return;

    localStorage.setItem("correo_ticket", correo);
    const userKey = cleanEmailKey(correo);

    database.ref('users/' + userKey).once('value').then((snapshot) => {
      const data = snapshot.val() || {};
      let saldoDebito = data.debito !== undefined ? parseFloat(data.debito) : 0.00;
      let saldoPuntos = data.puntos !== undefined ? parseInt(data.puntos) : 0;

      let nuevoDebito = saldoDebito + transaccionActual.cashback;
      let nuevosPuntos = saldoPuntos + transaccionActual.puntos;

      database.ref('users/' + userKey + '/debito').set(parseFloat(nuevoDebito.toFixed(6)));
      database.ref('users/' + userKey + '/puntos').set(nuevosPuntos)
      .then(() => {
        acumuladoCashback += transaccionActual.cashback;
        acumuladoPuntos += transaccionActual.puntos;
        localStorage.setItem("t_cashback", acumuladoCashback);
        localStorage.setItem("t_puntos", acumuladoPuntos);

        const fechaStr = new Date().toLocaleTimeString("es-MX", { hour: '2-digit', minute: '2-digit' });
        historialTransacciones.unshift({
          hora: fechaStr,
          comercio: transaccionActual.comercio,
          cashback: transaccionActual.cashback.toFixed(2),
          puntos: transaccionActual.puntos
        });
        localStorage.setItem("h_transacciones", JSON.stringify(historialTransacciones));

        actualizarMarcadores();
        actualizarHistorialVisual();
        document.getElementById("btnSumar").style.display = "none";
        document.getElementById("previewContainer").style.display = "none";
        document.getElementById("detallesTicket").style.display = "none";
        document.getElementById("foto-ticket").value = "";
        transaccionActual = null;

        alert("✅ ¡Éxito! El monto total real ha sido procesado y enviado a Firebase.");
      })
      .catch(() => alert("❌ Error en la transferencia de red con Firebase."));
    });
  }

  function actualizarHistorialVisual() {
    const contenedor = document.getElementById("listaTickets");
    contenedor.innerHTML = "";

    if (historialTransacciones.length === 0) {
      contenedor.innerHTML = '<div class="historial-item" style="color:#666;border:none;">Ningún beneficio guardado aún.</div>';
      return;
    }

    historialTransacciones.forEach((item) => {
      contenedor.innerHTML += `
        <div class="historial-item">
          <strong>${item.comercio}</strong> (${item.hora}) — Regresó: <span style="color:#fff;">+$${item.cashback}</span> y <span style="color:#00ff99;">+${item.puntos} pts</span>
        </div>
      `;
    });
  }
</script>

</body>
</html>
