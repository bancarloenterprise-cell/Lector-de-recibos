<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contador de Tickets - Bancarlo</title>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
<style>
  html, body {
    height: 100%;
    margin: 0;
    padding: 0;
    background-color: #000;
    font-family: "Poppins", sans-serif;
    color: #00ff66;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }

  .wrapper {
    min-height: 100%;
    display: flex;
    flex-direction: column;
    box-sizing: border-box;
    padding: 20px;
    width: 100%;
  }

  h1 {
    color: #00ff66;
    text-align: center;
    margin-top: 10px;
    margin-bottom: 20px;
    font-size: 2rem;
  }

  .card {
    background-color: #111;
    padding: 25px;
    border-radius: 12px;
    width: 100%;
    box-shadow: 0 0 15px rgba(0, 255, 102, 0.3);
    box-sizing: border-box;
    margin-bottom: 20px;
    border: 1px solid #222;
  }

  .contador-contenedor {
    display: flex;
    justify-content: space-between;
    gap: 15px;
    margin: 20px 0;
  }

  .pantalla {
    flex: 1;
    background-color: #161616;
    padding: 15px;
    border-radius: 8px;
    border: 2px dashed #00ff66;
    text-align: center;
  }

  .pantalla span {
    display: block;
    font-size: 0.9rem;
    color: #888;
    margin-bottom: 5px;
  }

  .pantalla div {
    font-size: 2.2rem;
    font-weight: bold;
    color: #fff;
  }

  label {
    font-size: 1.1rem;
    color: #00ff66;
    display: block;
    margin-bottom: 8px;
  }

  input, button {
    display: block;
    width: 100%;
    margin: 15px 0;
    box-sizing: border-box;
  }

  input {
    padding: 15px;
    border-radius: 8px;
    border: 1px solid #333;
    outline: none;
    background-color: #222;
    color: #fff;
    font-size: 1.1rem;
  }

  input[type="file"] {
    display: none;
  }

  .custom-file-upload {
    border: 2px solid #00ff66;
    display: block;
    padding: 15px;
    cursor: pointer;
    background: #222;
    color: #fff;
    border-radius: 8px;
    font-weight: bold;
    text-align: center;
    font-size: 1.1rem;
    margin-top: 15px;
  }

  .custom-file-upload:hover {
    background: #292929;
    box-shadow: 0 0 10px #00ff66;
  }

  button {
    background-color: #00ff66;
    color: #000;
    padding: 15px;
    font-weight: bold;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-size: 1.1rem;
    transition: 0.3s;
  }

  button:hover {
    background-color: #00cc55;
  }

  .detalles-ticket {
    background: #1c1c1c;
    padding: 15px;
    border-radius: 8px;
    margin-top: 15px;
    text-align: left;
    display: none;
    font-size: 1.05rem;
    color: #fff;
    border-left: 4px solid #00ff66;
  }

  .historial {
    background: #111;
    border-radius: 8px;
    padding: 20px;
    width: 100%;
    box-sizing: border-box;
    margin-bottom: 20px;
  }

  .historial-item {
    border-bottom: 1px solid #222;
    padding: 12px 0;
    font-size: 1rem;
  }

  .preview-container {
    border-radius: 8px;
    overflow: hidden;
    border: 2px solid #222;
    background-color: #111;
    display: none;
    width: 100%;
    text-align: center;
    padding-bottom: 20px;
  }

  .preview-container img {
    width: 100%;
    max-width: 400px;
    height: auto;
    display: inline-block;
    margin-top: 10px;
  }
</style>
</head>
<body>

  <div class="wrapper">
    <h1>🧾 Contador de Tickets Bancarlo</h1>
    
    <div class="card">
      <label for="correo">📧 Correo electrónico de cuenta Bancarlo:</label>
      <input type="email" id="correo" placeholder="tucorreo@gmail.com" oninput="conectarUsuarioFirebase()">

      <div class="contador-contenedor">
        <div class="pantalla">
          <span>CASHBACK TOTAL</span>
          <div id="pantallaCashback">$0.00</div>
        </div>
        <div class="pantalla">
          <span>PUNTOS BANCARLO</span>
          <div id="pantallaPuntos">0 pts</div>
        </div>
      </div>

      <label for="foto-ticket" class="custom-file-upload" id="labelCarga">
        📸 Escanear ticket o recibo
      </label>
      <input type="file" id="foto-ticket" accept="image/*" onchange="procesarTicketReal(event)">

      <div class="detalles-ticket" id="detallesTicket"></div>

      <button id="btnSumar" onclick="depositarFondosOPuntos()" style="display: none; margin-top: 15px;">➕ Validar y Subir a Firebase</button>
    </div>

    <div class="historial">
      <h3 style="margin-top:0; color:#00ff66; font-size: 1.3rem;">📜 Historial de Beneficios Obtenidos</h3>
      <div id="listaTickets"></div>
    </div>

    <div class="preview-container" id="previewContainer">
      <h4 style="color:#888;">🖼️ Vista previa del ticket procesado</h4>
      <img id="imgPreview" src="" alt="Ticket">
    </div>
  </div>

<script>
  // Inicialización de Firebase
  const firebaseConfig = {
      apiKey: "AIzaSyDNnq2YzWJLi_YfPNqgRY4oCMKOJQjrOGw",
      databaseURL: "https://bancarlo-23297-default-rtdb.firebaseio.com",
      projectId: "bancarlo-23297",
  };
  
  firebase.initializeApp(firebaseConfig);
  const database = firebase.database();

  let acumuladoCashback = 0.00;
  let acumuladoPuntos = 0;
  let historialTransacciones = [];
  let transaccionActual = null;

  window.onload = () => {
    document.getElementById("correo").value = ""; 
    actualizarMarcadores();
    actualizarHistorialVisual();
  };

  function cleanEmailKey(email) {
    return email.toLowerCase().replace(/\./g, '_');
  }

  function actualizarMarcadores() {
    document.getElementById("pantallaCashback").innerText = `$${acumuladoCashback.toFixed(2)}`;
    document.getElementById("pantallaPuntos").innerText = `${acumuladoPuntos} pts`;
  }

  function conectarUsuarioFirebase() {
    const correo = document.getElementById("correo").value.trim();
    if (!correo || !correo.includes("@")) {
      acumuladoCashback = 0.00;
      acumuladoPuntos = 0;
      historialTransacciones = [];
      actualizarMarcadores();
      actualizarHistorialVisual();
      return;
    }

    const userKey = cleanEmailKey(correo);
    database.ref('users/' + userKey).once('value').then((snapshot) => {
      const data = snapshot.val() || {};
      acumuladoCashback = data.cashbackAcumulado !== undefined ? parseFloat(data.cashbackAcumulado) : 0.00;
      acumuladoPuntos = data.puntos !== undefined ? parseInt(data.puntos) : 0;
      actualizarMarcadores();
      actualizarHistorialVisual();
    }).catch((err) => {
      console.log("Esperando correo válido...");
    });
  }

  // Generador de fluctuación diaria basada en la fecha
  function obtenerFactorDia(idSemilla) {
    const diaDelMes = new Date().getDate();
    const x = Math.sin(diaDelMes + idSemilla) * 10000;
    const pseudoRandom = x - Math.floor(x);
    return 0.85 + (pseudoRandom * 0.30); 
  }

  // Lista de comercios base
  const comerciosOfertas = [
    { id: 1, nombre: "Gasolineras", palabrasClave: ["g500", "g 500", "zumpango", "constituyentes", "gasolina", "reman", "pemex"], tipo: "cashback", valorBase: 0.02, fija: true },
    { id: 2, nombre: "Farmacia Guadalajara", palabrasClave: ["guadalajara", "superfarma", "farmacias guadalajara"], tipo: "cashback", valorBase: 0.025, fija: false },
    { id: 3, nombre: "Asturiano", palabrasClave: ["asturiano", "tienda asturiano"], tipo: "cashback", valorBase: 0.04, fija: false },
    { id: 4, nombre: "Salchichonería San Juan", palabrasClave: ["salchichoneria san juan", "san juan embutidos"], tipo: "cashback", valorBase: 0.025, fija: false },
    { id: 5, nombre: "The Italian Coffee", palabrasClave: ["italian", "coffee", "the italian"], tipo: "puntos", valorBase: 60, fija: false },
    { id: 6, nombre: "Que Bara", palabrasClave: ["que bara", "bara"], tipo: "puntos", valorBase: 30, fija: false },
    { id: 7, nombre: "Walmart", palabrasClave: ["walmart", "supercenter"], tipo: "puntos", valorBase: 55, fija: false }
  ];

  async function procesarTicketReal(event) {
    const correo = document.getElementById("correo").value.trim();
    if (!correo) {
      alert("⚠️ Primero debes ingresar tu correo electrónico.");
      event.target.value = "";
      return;
    }

    const input = event.target;
    if (!input.files || !input.files[0]) return;

    const file = input.files[0];
    const labelCarga = document.getElementById("labelCarga");
    const panelDetalles = document.getElementById("detallesTicket");
    
    labelCarga.innerText = "⏳ Analizando estructura del ticket...";
    panelDetalles.style.display = "block";
    panelDetalles.innerHTML = "<strong>Extrayendo información de la imagen...</strong>";

    const reader = new FileReader();
    reader.onload = async function(e) {
      document.getElementById("imgPreview").src = e.target.result;
      document.getElementById("previewContainer").style.display = "block";

      try {
        const result = await Tesseract.recognize(e.target.result, 'spa');
        const textoLimpio = result.data.text.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
        const nombreArchivo = file.name.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
        const textoAnalisis = textoLimpio + " " + nombreArchivo;

        let comercioDetectado = comerciosOfertas.find(c => {
          return c.palabrasClave.some(palabra => textoAnalisis.includes(palabra));
        });

        let nombreEstablecimiento = comercioDetectado ? comercioDetectado.nombre : "Consumo General";

        let montoCompra = 0;
        const regexNumeros = /\b([0-9]{1,5}\.[0-9]{2})\b/g;
        let coincidencias;
        let todosLosMontos = [];

        while ((coincidencias = regexNumeros.exec(textoLimpio)) !== null) {
          if (coincidencias[1]) {
            todosLosMontos.push(parseFloat(coincidencias[1]));
          }
        }
        if (todosLosMontos.length > 0) {
          montoCompra = Math.max(...todosLosMontos);
        }

        let confirmNombre = prompt("Confirma o escribe el nombre del Establecimiento del ticket:", nombreEstablecimiento);
        if (confirmNombre) nombreEstablecimiento = confirmNombre;

        let confirmMonto = prompt("Confirma o introduce el Monto Total ($) exacto del ticket:", montoCompra > 0 ? montoCompra : "0.00");
        if (confirmMonto) montoCompra = parseFloat(confirmMonto) || 0;

        let comercioFinal = comerciosOfertas.find(c => 
          nombreEstablecimiento.toLowerCase().includes(c.nombre.toLowerCase())
        );

        if (!comercioFinal) {
          comercioFinal = { id: 99, nombre: nombreEstablecimiento, tipo: "cashback", valorBase: 0.02, fija: true };
        }

        let factorDia = comercioFinal.fija ? 1.0 : obtenerFactorDia(comercioFinal.id); 
        let cashbackGanado = 0;
        let puntosGanados = 0;
        let mensajeRegla = "";

        if (comercioFinal.tipo === "cashback") {
          let tasaDelDia = comercioFinal.valorBase * factorDia;
          let tasaFinalEfectiva = tasaDelDia / (1 + (montoCompra / 2500));
          
          if (tasaFinalEfectiva > 0.05) tasaFinalEfectiva = 0.05;
          if (tasaFinalEfectiva < 0.002) tasaFinalEfectiva = 0.002;

          cashbackGanado = montoCompra * tasaFinalEfectiva;
          mensajeRegla = `Porcentaje del día ajustado por monto: ${(tasaFinalEfectiva * 100).toFixed(2)}% de cashback asignado.`;
          
        } else if (comercioFinal.tipo === "puntos") {
          let puntosBaseDia = comercioFinal.valorBase * factorDia;
          let puntosFinales = puntosBaseDia / (1 + (montoCompra / 1500));
          puntosGanados = Math.max(1, Math.round(puntosFinales));
          
          mensajeRegla = `Bonificación calibrada por costo: +${puntosGanados} puntos asignados ($${(puntosGanados * 0.20).toFixed(2)} transferibles a débito).`;
        }

        transaccionActual = {
          comercio: comercioFinal.nombre,
          monto: montoCompra,
          cashback: cashbackGanado,
          puntos: puntosGanados
        };

        panelDetalles.innerHTML = `
          <strong>🏪 Establecimiento Reconocido:</strong> ${comercioFinal.nombre}<br>
          <strong>📄 Archivo Analizado:</strong> ${file.name}<br>
          <strong>💵 Monto Total Escaneado:</strong> $${montoCompra.toFixed(2)}<br>
          <strong>📢 Regla Aplicada:</strong> ${mensajeRegla}<br>
          <hr style="border:1px solid #333;">
          <span style="color:#00ff66; font-weight:bold;">Beneficio Directo a Tarjeta: +$${cashbackGanado.toFixed(2)} por Cashback | +$${(puntosGanados * 0.20).toFixed(2)} por Puntos</span>
        `;

        document.getElementById("btnSumar").style.display = "block";

      } catch (err) {
        console.error(err);
        alert("❌ Error procesando el ticket.");
      } finally {
        labelCarga.innerText = "📸 Escanear ticket o recibo";
      }
    };
    reader.readAsDataURL(file);
  }

  function depositarFondosOPuntos() {
    const correo = document.getElementById("correo").value.trim();
    if (!correo || !transaccionActual) return;

    const userKey = cleanEmailKey(correo);

    database.ref('users/' + userKey).once('value').then((snapshot) => {
      const data = snapshot.val() || {};
      
      let saldoDebito = data.debito !== undefined ? parseFloat(data.debito) : 0.00;
      let saldoCashbackTotal = data.cashbackAcumulado !== undefined ? parseFloat(data.cashbackAcumulado) : 0.00;
      let saldoPuntos = data.puntos !== undefined ? parseInt(data.puntos) : 0;

      // REGLA: Convertir puntos ganados a dinero líquido ($0.20 por punto)
      let dineroPorPuntos = transaccionActual.puntos * 0.20;

      // El saldo real de la tarjeta recibe la suma de todo: Cashback + Valor en efectivo de los puntos
      let nuevoDebito = saldoDebito + transaccionActual.cashback + dineroPorPuntos;
      
      // Mantenemos los contadores históricos y de visualización independientes
      let nuevoCashbackTotal = saldoCashbackTotal + transaccionActual.cashback;
      let nuevosPuntos = saldoPuntos + transaccionActual.puntos;

      database.ref('users/' + userKey + '/debito').set(parseFloat(nuevoDebito.toFixed(6)));
      database.ref('users/' + userKey + '/cashbackAcumulado').set(parseFloat(nuevoCashbackTotal.toFixed(6)));
      database.ref('users/' + userKey + '/puntos').set(nuevosPuntos)
      .then(() => {
        acumuladoCashback = nuevoCashbackTotal;
        acumuladoPuntos = nuevosPuntos;

        const fechaStr = new Date().toLocaleTimeString("es-MX", { hour: '2-digit', minute: '2-digit' });
        historialTransacciones.unshift({
          hora: fechaStr,
          comercio: transaccionActual.comercio,
          cashback: transaccionActual.cashback.toFixed(2),
          puntos: transaccionActual.puntos,
          dineroInyectado: (transaccionActual.cashback + dineroPorPuntos).toFixed(2)
        });

        actualizarMarcadores();
        actualizarHistorialVisual();
        
        document.getElementById("btnSumar").style.display = "none";
        document.getElementById("previewContainer").style.display = "none";
        document.getElementById("detallesTicket").style.display = "none";
        document.getElementById("foto-ticket").value = "";
        transaccionActual = null;

        alert("✅ ¡Éxito! Cashback y dinero de puntos depositados directo a tu saldo de débito.");
      })
      .catch(() => alert("❌ Error de red al sincronizar con Firebase."));
    });
  }

  function actualizarHistorialVisual() {
    const contenedor = document.getElementById("listaTickets");
    contenedor.innerHTML = "";

    if (historialTransacciones.length === 0) {
      contenedor.innerHTML = '<div class="historial-item" style="color:#666;border:none;">Ningún beneficio guardado en esta sesión.</div>';
      return;
    }

    historialTransacciones.forEach((item) => {
      contenedor.innerHTML += `
        <div class="historial-item">
          <strong>${item.comercio}</strong> (${item.hora}) — Enviados a Tarjeta: <span style="color:#fff; font-weight:bold;">+$${item.dineroInyectado} MXN</span> (De los cuales: +$${item.cashback} fue cashback y +${item.puntos} pts)
        </div>
      `;
    });
  }
</script>

</body>
</html>
